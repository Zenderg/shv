services:
  shv:
    build: .
    container_name: shv
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${SHV_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      SOURCE_EXTENSION_PROFILE: "dev"
      LIBRARY_ROOT: "/data/library"
      APP_DATA_ROOT: "/data/app"
      WORK_ROOT: "/work"
    volumes:
      - ./data/library:/data/library
      - ./data/app:/data/app
      - ./data/work:/work
