name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: "24"

jobs:
  release:
    name: Build and publish release image
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vX.Y.Z format." >&2
            exit 1
          fi

          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" refs/remotes/origin/main; then
            echo "Release tag ${GITHUB_REF_NAME} must point to a commit reachable from main." >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build application
        run: npm run build

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          repository="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${repository}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=shv
            org.opencontainers.image.description=Self-hosted local video library and downloader for a trusted LAN or VPN.
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail

          image_tag="${IMAGE_NAME}:${GITHUB_REF_NAME}"
          version_tag="${IMAGE_NAME}:${GITHUB_REF_NAME#v}"

          cat > release-body.md <<EOF
          ## Container image

          Primary image:

          \`\`\`text
          ${image_tag}
          \`\`\`

          Version alias:

          \`\`\`text
          ${version_tag}
          \`\`\`

          Digest:

          \`\`\`text
          ${IMAGE_DIGEST}
          \`\`\`

          ## Deploy

          Use the versioned image tag in Docker Compose:

          \`\`\`yaml
          services:
            shv:
              image: ${image_tag}
              container_name: shv
              restart: unless-stopped
              ports:
                - "\${SHV_PORT:-8080}:8080"
              environment:
                PORT: "8080"
                HOST: "0.0.0.0"
                LIBRARY_ROOT: "/data/library"
                APP_DATA_ROOT: "/data/app"
                WORK_ROOT: "/work"
              volumes:
                - ./data/library:/data/library
                - ./data/app:/data/app
                - ./data/work:/work
          \`\`\`

          ## Release notes

          This draft is created automatically after the image is published. Codex should replace this section with the user-facing changelog before publishing the release.
          EOF

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; leaving its notes untouched."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-body.md \
              --draft
          fi
